<!-- 表單填寫分頁 -->
<div style="background: #28334A; color: #B7D4E8; min-height: 100vh; font-family: sans-serif;">
  <header style="padding: 20px 40px; font-size: 2em; letter-spacing: 5px;">拾心市集</header>
  <nav style="display: flex; gap: 30px; padding: 0 40px; font-weight: bold;">
    <a href="#" style="color: inherit; text-decoration: none;">首頁</a>
    <a href="#" style="color: inherit; text-decoration: none;">商品分類</a>
    <a href="#" style="color: inherit; text-decoration: underline;">表單填寫</a>
    <a href="#" style="color: inherit; text-decoration: none;">購物說明</a>
    <a href="#" style="color: inherit; text-decoration: none;">關於我們</a>
  </nav>
  <main style="margin: 50px auto; width: 350px; background: #9FC5E8; padding: 30px 25px; border-radius: 20px;">
    <form>
      <label>姓名：<input type="text" name="username" required style="width: 100%; margin-bottom: 10px;"></label><br>
      <label>Email：<input type="email" name="email" required style="width: 100%; margin-bottom: 10px;"></label><br>
      <label>聯絡電話：<input type="tel" name="phone" style="width: 100%; margin-bottom: 10px;"></label><br>
      <label>留言內容：<textarea name="message" rows="4" style="width: 100%;"></textarea></label><br>
      <button type="submit" style="margin-top: 15px; width: 100%; background: #28334A; color: #fff; border: none; padding: 10px; border-radius: 8px;">送出</button>
    </form>
  </main>
</div>
